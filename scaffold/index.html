<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="color-scheme" content="dark">
<title>Web Terminal</title>
<!-- App icons and web-app manifest are deployment-specific; add your own. -->
<link rel="stylesheet" href="/style.css">
<!-- [html-validate-disable-next no-style-tag -- critical CSS for instant loading indicator] -->
<style>
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:200;background:#000;font-family:system-ui,-apple-system,sans-serif;color:#b48eff;font-size:18px;transition:opacity .3s ease}
#loading.fade{opacity:0}
#loading .spin{width:32px;height:32px;border:3px solid #b48eff;border-right-color:transparent;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<!-- mount() builds the entire terminal UI inside this single root element.
     The loading overlay is a sibling (not a child of the root) so mount never
     clears it; mount fades it out once the first frame renders. -->
<div id="terminal"></div>
<div id="loading"><div class="spin"></div>Loading…</div>
<!-- Deployment-specific: the importmap resolves the bare package specifiers to
     the compiled JS your build emits. Adjust the paths to your build layout. -->
<script type="importmap">
{
  "imports": {
    "@cplieger/web-terminal-engine": "/vendor/cplieger-web-terminal-engine/index.js",
    "@cplieger/web-terminal-ui": "/vendor/cplieger-web-terminal-ui/index.js"
  }
}
</script>
<script type="module">
  import { mount } from "@cplieger/web-terminal-ui";
  mount(document.getElementById("terminal"), { loading: document.getElementById("loading") });
</script>
</body>
</html>
