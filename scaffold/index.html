<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="color-scheme" content="dark">
<title>Web Terminal</title>
<!-- App icons and web-app manifest are deployment-specific; add your own. -->
<link rel="stylesheet" href="/style.css">
<!-- [html-validate-disable-next no-style-tag -- critical CSS for instant loading indicator] -->
<style>
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:200;background:#000;font-family:system-ui,-apple-system,sans-serif;color:#b48eff;font-size:18px;transition:opacity .3s ease}
#loading.fade{opacity:0}
#loading .spin{width:32px;height:32px;border:3px solid #b48eff;border-right-color:transparent;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="term" class="term">
  <div id="term-output" class="term-output" role="log" aria-live="off" aria-roledescription="Terminal" aria-label="Terminal"></div>
  <textarea id="term-input" class="term-input" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Terminal input" tabindex="-1"></textarea>
  <div id="composition-view" class="composition-view" aria-hidden="true"></div>
  <div id="pred-cursor" class="pred-cursor" aria-hidden="true"></div>
</div>
<div id="loading"><div class="spin"></div>Loading…</div>
<div id="conn-banner" class="conn-banner" role="status" aria-live="polite"></div>
<div id="key-toolbar" class="key-toolbar collapsed no-transition" aria-label="Navigation keys" role="toolbar">
  <button type="button" id="kb-toggle" class="kb-toggle"      aria-label="Toggle key toolbar"><svg class="icon-hamburger" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg><svg class="icon-close" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
  <button type="button" id="kb-tab"    class="kb-key kb-r1c1" aria-label="Tab">TAB</button>
  <button type="button" id="kb-esc"    class="kb-key kb-r1c2" aria-label="Escape">ESC</button>
  <button type="button" id="kb-up"     class="kb-key kb-r1c3" aria-label="Up"><svg viewBox="0 0 24 24"><polyline points="6 15 12 9 18 15"/></svg></button>
  <button type="button" id="kb-enter"  class="kb-key kb-r1c4" aria-label="Enter"><svg viewBox="0 0 24 24"><polyline points="9 10 4 15 9 20"/><polyline points="20 4 20 15 4 15"/></svg></button>
  <button type="button" id="scroll-bottom" class="kb-scroll-bottom" aria-label="Scroll to bottom"><svg viewBox="0 0 24 24"><path fill="none" d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg></button>
  <button type="button" id="kb-ctrl"   class="kb-key kb-r2c1" aria-label="Sticky Ctrl modifier" aria-pressed="false">CTRL</button>
  <button type="button" id="kb-left"   class="kb-key kb-r2c2" aria-label="Left"><svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg></button>
  <button type="button" id="kb-down"   class="kb-key kb-r2c3" aria-label="Down"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
  <button type="button" id="kb-right"  class="kb-key kb-r2c4" aria-label="Right"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
</div>
<div id="ctx-menu" class="ctx-menu"></div>
<!-- Deployment-specific: the importmap resolves the bare engine specifier to
     the engine's compiled JS, and /app.js is your bundle that calls
     `mount()` from @cplieger/web-terminal-ui. Adjust paths to your build. -->
<script type="importmap">
{
  "imports": {
    "@cplieger/web-terminal": "/vendor/cplieger-web-terminal/index.js"
  }
}
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
